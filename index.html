<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡牌記憶遊戲 - 極限挑戰版</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            overscroll-behavior: none; 
            touch-action: manipulation;
        }

        h1 { margin: 10px 0 5px 0; font-size: 1.5rem; }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .stat-item { color: #0fb9b1; }
        #timer { color: #ff5e57; }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            perspective: 1000px;
            width: 95vw;
            max-width: 400px;
        }

        .card {
            aspect-ratio: 2 / 3;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s, opacity 0.5s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card.matched {
            opacity: 0;
            transform: rotateY(180deg) scale(0);
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .card-front {
            transform: rotateY(180deg);
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-front img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .card-back {
            background-image: url('pokerCards/card back black.png');
            background-size: cover;
            background-position: center;
            border: 1.5px solid #fff;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 18px;
            font-size: 0.9rem;
            cursor: pointer;
            background-color: #0fb9b1;
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px #098b85;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #098b85;
        }

        #fullscreen-btn { background-color: #4b7bec; box-shadow: 0 4px #3867d6; }
    </style>
</head>
<body>

    <h1>卡牌記憶挑戰</h1>
    
    <div class="stats-container">
        <div class="stat-item">次數: <span id="moves">0</span></div>
        <div class="stat-item">剩餘時間: <span id="timer">60</span>s</div>
    </div>
    
    <div class="game-board" id="game-board"></div>

    <div class="controls">
        <button id="restart-btn">重新開始</button>
        <button id="fullscreen-btn">全螢幕</button>
    </div>

    <script>
        $(document).ready(function() {
            const cardImages = [
                'ace_of_spades.png', 'king_of_hearts.png', 
                'queen_of_diamonds.png', 'jack_of_clubs.png', 
                '10_of_spades.png', '9_of_hearts.png',
                '8_of_diamonds.png', '7_of_clubs.png'
            ];

            let firstCard, secondCard;
            let hasFlippedCard = false;
            let lockBoard = false;
            let moves = 0;
            let matchedPairs = 0;
            let timeLeft = 60;
            let timerInterval;

            function startTimer() {
                clearInterval(timerInterval);
                timeLeft = 60;
                $('#timer').text(timeLeft);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    $('#timer').text(timeLeft);
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        lockBoard = true;
                        alert("時間到！遊戲結束。您總共配對了 " + matchedPairs + " 組卡牌。");
                    }
                }, 1000);
            }

            function initGame() {
                clearInterval(timerInterval);
                $('#game-board').empty();
                let cards = [...cardImages, ...cardImages]; 
                shuffle(cards);
                
                moves = 0;
                matchedPairs = 0;
                $('#moves').text(moves);
                resetState();
                
                cards.forEach(img => {
                    const cardHTML = `
                        <div class="card" data-card="${img}">
                            <div class="card-face card-front">
                                <img src="pokerCards/${img}">
                            </div>
                            <div class="card-face card-back"></div>
                        </div>
                    `;
                    $('#game-board').append(cardHTML);
                });

                $('.card').on('click', flipCard);
                startTimer();
            }

            function shuffle(array) {
                array.sort(() => Math.random() - 0.5);
            }

            function flipCard() {
                if (lockBoard) return;
                if ($(this).hasClass('flipped')) return;

                $(this).addClass('flipped');

                if (!hasFlippedCard) {
                    hasFlippedCard = true;
                    firstCard = $(this);
                    return;
                }

                secondCard = $(this);
                moves++;
                $('#moves').text(moves);
                checkForMatch();
            }

            function checkForMatch() {
                let isMatch = firstCard.data('card') === secondCard.data('card');
                isMatch ? disableCards() : unflipCards();
            }

            function disableCards() {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.addClass('matched');
                    secondCard.addClass('matched');
                    matchedPairs++;
                    if (matchedPairs === cardImages.length) {
                        clearInterval(timerInterval);
                        setTimeout(() => alert("太強了！你在時間內清空了所有卡牌！"), 300);
                    }
                    resetState();
                }, 600);
            }

            function unflipCards() {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.removeClass('flipped');
                    secondCard.removeClass('flipped');
                    resetState();
                }, 1000);
            }

            function resetState() {
                [hasFlippedCard, lockBoard] = [false, false];
                [firstCard, secondCard] = [null, null];
            }

            $('#fullscreen-btn').on('click', function() {
                let elem = document.documentElement;
                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                    $(this).text('退出全螢幕');
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    $(this).text('全螢幕');
                }
            });

            $('#restart-btn').on('click', initGame);
            initGame(); // 頁面載入後自動開始遊戲
        });
    </script>
</body>
</html>
