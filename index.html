<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡牌記憶遊戲 - 滾輪修復完美版</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* 1. 【關鍵修復】確保網頁永遠有正常的垂直滾動能力 */
        html,
        body {
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
            /* 讓手機滑動更順暢 */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .header-box {
            text-align: center;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            color: #0fb9b1;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            justify-content: center;
        }

        .stat-item {
            color: #A6FFFF;
        }

        #timer {
            color: #ff5e57;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            perspective: 1000px;
            width: 95vw;
            max-width: 400px;
            /* 給予最小高度，防止重置瞬間高度歸零 */
            min-height: 550px;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card {
            aspect-ratio: 2 / 3;
            position: relative;
            cursor: pointer;
            opacity: 0;
            animation: cardEnter 0.4s ease-out forwards;
        }

        /* 專屬的收牌退場特效 */
        .card.fade-out {
            animation: none !important;
            opacity: 0 !important;
            transform: scale(0.8) !important;
            transition: opacity 0.3s ease-in, transform 0.3s ease-in !important;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            opacity: 0;
            transform: rotateY(180deg) scale(0.85);
        }

        .card.matched {
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .card-front {
            transform: rotateY(180deg);
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid white;
        }

        .card-front img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .card-back {
            background-image: url("img/big.webp");
            background-size: cover;
            background-position: center;
            border: 2px solid #fff;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 50px;
            /* 底部多留一點空間 */
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #ff5e57;
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px #c0392b;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px #c0392b;
        }

        #fullscreen-btn {
            background-color: #4b7bec;
            box-shadow: 0 4px #3867d6;
        }

        #fullscreen-btn:active {
            box-shadow: 0 0px #3867d6;
        }
    </style>
</head>

<body>

    <div class="header-box">
        <h1>卡牌記憶挑戰</h1>
        <div class="stats-container">
            <div class="stat-item">次數: <span id="moves">0</span></div>
            <div class="stat-item">剩餘時間: <span id="timer">60</span>s</div>
        </div>
    </div>

    <div class="game-board" id="game-board"></div>

    <div class="controls">
        <button id="restart-btn">重新開始</button>
        <button id="fullscreen-btn">全螢幕</button>
    </div>

    <script>
        $(document).ready(function () {
            const cardImages = [
                "2_of_clubs.png", "9_of_hearts.png", "5_of_clubs.png", "10_of_hearts.png",
                "queen_of_diamonds.png", "king_of_spades2.png", "jack_of_spades.png", "6_of_diamonds.png"
            ];

            let firstCard, secondCard;
            let hasFlippedCard = false;
            let lockBoard = false;
            let moves = 0;
            let matchedPairs = 0;
            let timeLeft = 60;
            let timerInterval;
            let isTimerRunning = false;

            function startTimer() {
                timerInterval = setInterval(() => {
                    timeLeft--;
                    $('#timer').text(timeLeft);
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        lockBoard = true;
                        alert("時間到！小卡拉咪 結束遊戲！");
                    }
                }, 1000);
            }

            function initGame() {
                clearInterval(timerInterval);
                $('#game-board').empty();
                let cards = [...cardImages, ...cardImages];
                shuffle(cards);

                moves = 0;
                matchedPairs = 0;
                timeLeft = 60;
                isTimerRunning = false;

                $('#moves').text(moves);
                $('#timer').text(timeLeft);
                resetState();

                cards.forEach((img, index) => {
                    const delay = index * 0.04;
                    const cardHTML = `
                        <div class="card" data-card="${img}" style="animation-delay: ${delay}s">
                            <div class="card-inner">
                                <div class="card-face card-front">
                                    <img src="pokerCards/${img}">
                                </div>
                                <div class="card-face card-back"></div>
                            </div>
                        </div>
                    `;
                    $('#game-board').append(cardHTML);
                });

                $('#game-board').off('click').on('click', '.card', flipCard);
            }

            function shuffle(array) {
                array.sort(() => Math.random() - 0.5);
            }

            function flipCard() {
                if (lockBoard) return;
                if ($(this).hasClass('flipped')) return;

                if (!isTimerRunning) {
                    startTimer();
                    isTimerRunning = true;
                }

                $(this).addClass('flipped');

                if (!hasFlippedCard) {
                    hasFlippedCard = true;
                    firstCard = $(this);
                    return;
                }

                secondCard = $(this);
                moves++;
                $('#moves').text(moves);
                checkForMatch();
            }

            function checkForMatch() {
                let isMatch = firstCard.data('card') === secondCard.data('card');
                isMatch ? disableCards() : unflipCards();
            }

            function disableCards() {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.addClass('matched');
                    secondCard.addClass('matched');
                    matchedPairs++;

                    if (matchedPairs === cardImages.length) {
                        clearInterval(timerInterval);
                        triggerFireworks();
                    }
                    resetState();
                }, 600);
            }

            function triggerFireworks() {
                var duration = 3 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({ particleCount: 20, angle: 60, spread: 100, origin: { x: 0 }, colors: ['#FA8072', '#FFA07A', '#FF4500'] });
                    confetti({ particleCount: 20, angle: 120, spread: 100, origin: { x: 1 }, colors: ['#FA8072', '#FFA07A', '#FF4500'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());

                setTimeout(() => {
                    alert(`恭喜過關! 共花了 ${60 - timeLeft} 秒，總計翻牌 ${moves} 次！`);
                }, 2000);
            }

            function unflipCards() {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.removeClass('flipped');
                    secondCard.removeClass('flipped');
                    resetState();
                }, 1000);
            }

            function resetState() {
                hasFlippedCard = false;
                lockBoard = false;
                firstCard = null;
                secondCard = null;
            }

            $('#fullscreen-btn').on('click', function () {
                let elem = document.documentElement;
                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                    $(this).text('退出全螢幕');
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    $(this).text('全螢幕');
                }
            });

            // 重新開始
            $('#restart-btn').on('click', function () {
                if (lockBoard) return;
                lockBoard = true;
                clearInterval(timerInterval);
                isTimerRunning = false;

                // 2. 【關鍵修復】平滑滾回最上方，防止瀏覽器高度判定錯亂鎖死滾輪
                window.scrollTo({ top: 0, behavior: 'smooth' });

                confetti({
                    particleCount: 50,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#0fb9b1', '#A6FFFF', '#ffffff']
                });

                let allCards = $('.card');

                allCards.each(function (index) {
                    setTimeout(() => {
                        $(this).removeClass('flipped matched').addClass('fade-out');
                    }, index * 40);
                });

                let waitTime = (allCards.length * 40) + 250;
                setTimeout(() => {
                    initGame();
                }, waitTime);
            });

            initGame();
        });
    </script>
</body>

</html>
